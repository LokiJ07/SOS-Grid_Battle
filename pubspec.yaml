name: sos_grid_battle
description: A classic SOS strategy game for mobile.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  audioplayers: ^5.2.1
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/sounds/placement.mp3
    - assets/sounds/score.mp3
    - assets/sounds/victory.mp3
    # Add these if you are using the Battle Mode features:
    # - assets/sounds/explosion.mp3
    # - assets/sounds/perk.mp3

# THIS BLOCK MUST BE AT THE ROOT (NO INDENTATION)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#0F0F0F"
  adaptive_icon_foreground: "assets/logo.png"